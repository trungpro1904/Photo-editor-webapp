<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .preview-area { min-height: 500px; background-color: #2c3e50; }
        .sidebar { max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">📸 Photo Editor</span>
            <span class="navbar-text text-secondary">Cửa sổ Preview</span>
        </div>
    </nav>

    <div class="container-fluid mt-0">
        <div class="row" style="height: calc(100vh - 60px);">
            <!-- Left Panel -->
            <div class="col-md-3 bg-light border-end p-3">
                <h5>Tải ảnh lên</h5>
                
                <div class="mb-3">
                    <label class="form-label">Chọn file ảnh:</label>
                    <input type="file" class="form-control" id="fileInput" accept="image/*" multiple>
                    <small class="text-muted">Hỗ trợ JPG, PNG, TIFF, RAW</small>
                </div>

                <button class="btn btn-primary w-100 mb-3" id="uploadBtn">
                    📤 Tải lên
                </button>

                <hr>

                <h6>Các ảnh đã tải</h6>
                <div id="imageList" class="sidebar">
                    <p class="text-muted small">Chưa có ảnh nào</p>
                </div>
            </div>

            <!-- Middle Panel - Preview -->
            <div class="col-md-6 preview-area d-flex align-items-center justify-content-center">
                <div id="previewPlaceholder" class="text-white-50 text-center">
                    <p style="font-size: 3rem;">📷</p>
                    <p>Chọn một ảnh để xem preview</p>
                </div>
                <img id="previewImage" src="" alt="Preview" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>

            <!-- Right Panel -->
            <div class="col-md-3 bg-light border-start p-3">
                <h5>Tùy chọn</h5>

                <div id="selectedImageInfo" class="alert alert-info d-none" role="alert">
                    <small id="selectedImageText"></small>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-success" id="editBtn" disabled>
                        ✏️ Mở chỉnh sửa
                    </button>
                    <button class="btn btn-info" id="rotateBtn" disabled>
                        🔄 Xoay 90°
                    </button>
                    <button class="btn btn-warning" id="flipBtn" disabled>
                        🔀 Lật ngang
                    </button>
                    <button class="btn btn-danger" id="deleteBtn" disabled>
                        🗑️ Xóa
                    </button>
                </div>

                <hr>

                <h6>Thông tin Chi tiết</h6>
                <div id="imageDetails" class="small">
                    <p class="text-muted">Chọn ảnh để xem thông tin</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple Photo Editor - Preview Page
        const API_BASE_URL = 'http://localhost:5000/api';
        let selectedImage = null;
        let uploadedImages = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            console.log('Photo Editor Preview - Ready!');
        });

        function setupEventListeners() {
            document.getElementById('uploadBtn').addEventListener('click', handleUpload);
            document.getElementById('editBtn').addEventListener('click', openEditWindow);
            document.getElementById('rotateBtn').addEventListener('click', handleQuickRotate);
            document.getElementById('flipBtn').addEventListener('click', handleQuickFlip);
            document.getElementById('deleteBtn').addEventListener('click', handleDelete);
        }

        async function handleUpload() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;

            if (files.length === 0) {
                alert('Vui lòng chọn ít nhất một file');
                return;
            }

            showLoading(true);

            for (let file of files) {
                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch(`${API_BASE_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error('Upload thất bại');
                    }

                    const data = await response.json();
                    uploadedImages.push({
                        filename: data.filename,
                        originalName: data.originalName,
                        path: data.path
                    });

                    console.log(`Upload thành công: ${data.originalName}`);
                } catch (error) {
                    console.error(`Lỗi upload: ${error.message}`);
                    alert(`Lỗi upload file ${file.name}: ${error.message}`);
                }
            }

            showLoading(false);
            fileInput.value = '';
            updateImageList();
        }

        function updateImageList() {
            const imageList = document.getElementById('imageList');

            if (uploadedImages.length === 0) {
                imageList.innerHTML = '<p class="text-muted small">Chưa có ảnh nào</p>';
                return;
            }

            imageList.innerHTML = uploadedImages
                .map((img, idx) => `
                    <div class="p-2 mb-2 border rounded ${selectedImage === idx ? 'bg-primary text-white' : 'bg-white'}" 
                         style="cursor: pointer;" 
                         onclick="selectImage(${idx})">
                        <small>${img.originalName}</small>
                    </div>
                `)
                .join('');
        }

        async function selectImage(index) {
            selectedImage = index;
            const image = uploadedImages[index];

            updateImageList();

            // Load preview
            const previewImage = document.getElementById('previewImage');
            const previewPlaceholder = document.getElementById('previewPlaceholder');

            previewImage.src = `${image.path}?t=${Date.now()}`;
            previewImage.style.display = 'block';
            previewPlaceholder.style.display = 'none';

            // Load metadata
            try {
                const response = await fetch(`${API_BASE_URL}/image/metadata/${image.filename}`);
                const data = await response.json();

                document.getElementById('imageDetails').innerHTML = `
                    <dt>Tên file:</dt>
                    <dd>${image.originalName}</dd>
                    <dt>Kích thước:</dt>
                    <dd>${data.width}x${data.height} pixel</dd>
                    <dt>Định dạng:</dt>
                    <dd>${data.format?.toUpperCase() || 'Unknown'}</dd>
                `;

                document.getElementById('selectedImageInfo').classList.remove('d-none');
                document.getElementById('selectedImageText').textContent = `Đã chọn: ${image.originalName}`;
            } catch (error) {
                console.error('Lỗi khi lấy metadata:', error);
            }

            // Enable buttons
            document.getElementById('editBtn').disabled = false;
            document.getElementById('rotateBtn').disabled = false;
            document.getElementById('flipBtn').disabled = false;
            document.getElementById('deleteBtn').disabled = false;
        }

        function openEditWindow() {
            if (selectedImage === null) return;
            const image = uploadedImages[selectedImage];
            sessionStorage.setItem('currentEditImage', image.filename);
            window.open('edit.html', '_blank', 'width=1400,height=800');
        }

        async function handleQuickRotate() {
            if (selectedImage === null) return;
            const image = uploadedImages[selectedImage];
            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/image/edit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: image.filename,
                        edits: { rotate: 90 }
                    })
                });

                if (!response.ok) throw new Error('Xoay ảnh thất bại');
                const previewImage = document.getElementById('previewImage');
                previewImage.src = `${image.path}?t=${Date.now()}`;
            } catch (error) {
                console.error('Lỗi:', error);
                alert(`Lỗi: ${error.message}`);
            }

            showLoading(false);
        }

        async function handleQuickFlip() {
            if (selectedImage === null) return;
            const image = uploadedImages[selectedImage];
            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/image/edit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: image.filename,
                        edits: { flipH: true }
                    })
                });

                if (!response.ok) throw new Error('Lật ảnh thất bại');
                const previewImage = document.getElementById('previewImage');
                previewImage.src = `${image.path}?t=${Date.now()}`;
            } catch (error) {
                console.error('Lỗi:', error);
                alert(`Lỗi: ${error.message}`);
            }

            showLoading(false);
        }

        function handleDelete() {
            if (selectedImage === null) return;
            
            if (!confirm('Bạn chắc chắn muốn xóa ảnh này?')) return;

            uploadedImages.splice(selectedImage, 1);
            selectedImage = null;

            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewPlaceholder').style.display = 'block';
            document.getElementById('imageDetails').innerHTML = '<p class="text-muted">Chọn ảnh để xem thông tin</p>';
            document.getElementById('selectedImageInfo').classList.add('d-none');
            document.getElementById('editBtn').disabled = true;
            document.getElementById('rotateBtn').disabled = true;
            document.getElementById('flipBtn').disabled = true;
            document.getElementById('deleteBtn').disabled = true;

            updateImageList();
        }

        function showLoading(show) {
            // Simple loading indicator
            if (show) {
                console.log('Loading...');
            } else {
                console.log('Done');
            }
        }
    </script>
</body>
</html>
